# LMCache local storage 真实 offload 配置
# 用途: AI-SSD 预研 - ai_ssd2_nvme3n1 候选盘
# 关键设计:
#   - chunk_size=256 tokens
#   - local_cpu=True -> L1 prefetch
#   - use_odirect=False -> NTFS 在 Linux 上 O_DIRECT 行为不一致(会回退或失败)
#     这是 AI-SSD 评估在 Windows 双系统盘上的固有限制
#     ext4 路径(基线)才开 O_DIRECT
#   - max_local_disk_size=20GB
chunk_size: 256
local_cpu: true
max_local_cpu_size: 4.0
local_disk: "file:///mnt/ai_ssd2/lmcache/"
max_local_disk_size: 20.0
extra_config:
  use_odirect: false
